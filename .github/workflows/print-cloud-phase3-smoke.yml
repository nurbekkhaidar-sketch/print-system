name: Print Cloud — Phase 3 smoke

on:
  push:
    paths:
      - "**"
  pull_request:
    paths:
      - "**"
  workflow_dispatch:

jobs:
  phase3-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write .env for CI
        run: |
          cat > print-cloud/.env << 'EOF'
          POSTGRES_DB=print
          POSTGRES_USER=print
          POSTGRES_PASSWORD=print_ci_secret

          PGHOST=db
          PGPORT=5432
          PGDATABASE=print
          PGUSER=print
          PGPASSWORD=print_ci_secret

          ADMIN_TOKEN=ci_admin_smoke_token
          PORTAL_TOKEN=ci_portal_smoke_token
          AGENTS=KIOSK_1:ci_agent_smoke_token
          API_PORT=3000
          EOF

      - name: Debug repo tree before compose
        working-directory: print-cloud
        run: |
          set -e
          echo "PWD=$(pwd)"
          echo "== print-cloud root =="
          ls -la
          echo "== api dir =="
          ls -la ./api || true
          echo "== portal dir =="
          ls -la ./portal || true
          echo "== package.json check =="
          test -f ./api/package.json && echo "FOUND ./api/package.json" || (echo "MISSING ./api/package.json" && exit 1)

      - name: Debug compose resolution
        working-directory: print-cloud
        run: |
          set -e
          docker compose config

      - name: Start DB and API only
        working-directory: print-cloud
        run: |
          docker compose up -d --build db api

      - name: Debug mounted /app in api container
        working-directory: print-cloud
        run: |
          set -e
          docker compose ps
          docker compose exec -T api sh -c 'pwd; ls -la /app; [ -f /app/package.json ] && echo FOUND || echo MISSING'

      - name: Wait for API
        working-directory: print-cloud
        run: |
          set -e
          for i in $(seq 1 60); do
            if curl -fsS "http://127.0.0.1:3000/api/agent/ping" >/dev/null 2>&1; then
              echo "API up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          docker compose ps || true
          echo "==== API LOGS ===="
          docker compose logs api || true
          echo "==== DB LOGS ===="
          docker compose logs db || true
          exit 1

      - name: Phase 3 happy-path smoke
        working-directory: print-cloud
        env:
          PHASE3_BASE_URL: http://127.0.0.1:3000
          PHASE3_PORTAL_TOKEN: ci_portal_smoke_token
          PHASE3_ADMIN_TOKEN: ci_admin_smoke_token
          PHASE3_PRINTER_ID: KIOSK_1
          PHASE3_AGENT_TOKEN: ci_agent_smoke_token
        run: pwsh -File scripts/phase3-smoke-test.ps1

      - name: Phase 3 negative smoke
        working-directory: print-cloud
        env:
          PHASE3_BASE_URL: http://127.0.0.1:3000
          PHASE3_PORTAL_TOKEN: ci_portal_smoke_token
          PHASE3_ADMIN_TOKEN: ci_admin_smoke_token
          PHASE3_PRINTER_ID: KIOSK_1
          PHASE3_AGENT_TOKEN: ci_agent_smoke_token
        run: pwsh -File scripts/phase3-smoke-negative.ps1

      - name: Stop stack
        if: always()
        working-directory: print-cloud
        run: |
          docker compose down -v || true