name: Print Cloud — Phase 3 smoke

on:
  push:
    paths:
      - "**"
  pull_request:
    paths:
      - "**"
  workflow_dispatch:

jobs:
  phase3-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write .env for CI (root)
        run: |
          cat > .env << 'EOF'
          POSTGRES_DB=print
          POSTGRES_USER=print
          POSTGRES_PASSWORD=print_ci_secret
          ADMIN_TOKEN=ci_admin_smoke_token
          PORTAL_TOKEN=ci_portal_smoke_token
          AGENTS=ci_kiosk:ci_agent_smoke_token
          API_PORT=3000
          EOF

      - name: Write .env for CI (print-cloud, if present)
        run: |
          if [ -d "print-cloud" ]; then
            cp .env print-cloud/.env
          fi

      - name: Start Docker Compose (root or print-cloud)
        run: |
          set -e
          if [ -f "docker-compose.yml" ] || [ -f "compose.yml" ]; then
            echo "Using compose in repo root"
            docker compose up -d
          elif [ -f "print-cloud/docker-compose.yml" ] || [ -f "print-cloud/compose.yml" ]; then
            echo "Using compose in print-cloud/"
            (cd print-cloud && docker compose up -d)
          else
            echo "No docker-compose.yml found in root or print-cloud/"
            ls -la
            echo "--- print-cloud ---"
            ls -la print-cloud || true
            exit 1
          fi

      - name: Wait for API
        run: |
          set -e
          for i in $(seq 1 50); do
            if curl -fsS "http://127.0.0.1:3000/api/agent/ping" >/dev/null 2>&1; then
              echo "API up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not become ready in time"
          docker compose ps || true
          docker compose logs api || true
          (cd print-cloud && docker compose ps) || true
          (cd print-cloud && docker compose logs api) || true
          exit 1

      - name: Phase 3 happy-path smoke
        env:
          PHASE3_BASE_URL: http://127.0.0.1:3000
          PHASE3_PORTAL_TOKEN: ci_portal_smoke_token
          PHASE3_ADMIN_TOKEN: ci_admin_smoke_token
          PHASE3_PRINTER_ID: ci_kiosk
          PHASE3_AGENT_TOKEN: ci_agent_smoke_token
        run: pwsh -File scripts/phase3-smoke-test.ps1

      - name: Phase 3 negative smoke
        env:
          PHASE3_BASE_URL: http://127.0.0.1:3000
          PHASE3_PORTAL_TOKEN: ci_portal_smoke_token
          PHASE3_ADMIN_TOKEN: ci_admin_smoke_token
          PHASE3_PRINTER_ID: ci_kiosk
          PHASE3_AGENT_TOKEN: ci_agent_smoke_token
        run: pwsh -File scripts/phase3-smoke-negative.ps1

      - name: Stop stack
        if: always()
        run: |
          docker compose down -v || true
          (cd print-cloud && docker compose down -v) || true
